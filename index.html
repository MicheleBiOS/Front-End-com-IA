<!-- Declara que este é um documento HTML5 -->
<!DOCTYPE html>
<!-- Tag raiz em português brasileiro -->
<html lang="pt-br">
<!-- Cabeçalho com metadados e configurações da página -->
<head>
    <!-- Define a codificação de caracteres (suporta acentos) -->
    <meta charset="UTF-8">
    <!-- Responsividade em dispositivos móveis -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Título da página (aparece na aba do navegador) -->
    <title>Net</title>
    <!-- Importa arquivo CSS externo -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Importa arquivo JavaScript externo -->
    <script src="assets/js/theme.js" defer></script>
</head>
<!-- Corpo da página -->
<body>
    <!-- Cabeçalho com logo -->
    <header>
        <!-- Título do logo Netflix -->
        <h2 class="logo">Netflix</h2>
        <!-- Botão para alternar entre modo escuro e claro -->
        <button id="theme-toggle" class="theme-toggle" aria-label="Alternar tema">
            <span class="sun-icon">☀️</span>
            <span class="moon-icon">🌙</span>
        </button>
    </header>
<!-- Conteúdo principal da página -->
<main>
    <!-- Seção semântica de seleção de perfis -->
    <section class="profile-selection">
        <!-- Título principal -->
        <h1>Quem está assistindo?</h1>
        <!-- Container dos perfis de usuários -->
        <ul class="profiles">
            <!-- Perfil do usuário 1 -->
            <li class="profile">
                <!-- Link para página home -->
                <a href="home.html">
                    <!-- Imagem do perfil -->
                    <img src="./assets/perfil01.png" alt="Imagem de um gato gordo" width="150px">
                    <!-- Nome do perfil -->
                    <p>Usuário 1</p>
                </a>
            </li>
            <!-- Perfil do usuário 2 -->
            <li class="profile">
                <a href="home.html">
                    <img src="./assets/perfil02.png" alt="Imagem de uma gata magra" width="150px">
                    <p>Usuário 2</p>
                </a>
            </li>
            <!-- Perfil para adicionar novo usuário -->
            <li class="profile add-profile">
                <a href="home.html">
                    <img src="./assets/perfil-adicionar.png" alt="Imagem de adição" width="150px">
                    <p>Adicionar Usuário</p>
                </a>
            </li>
        </ul>
    </section>
</main>
</body>
<!-- Fim do documento HTML -->
</html>
